<!doctype html>
<html lang="es-MX">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#047857" />
    <title>ViaMorelia</title>
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        background: #f8fafc;
        color: #0f172a;
        padding: 1.5rem;
        text-align: center;
      }
      .card {
        max-width: 22rem;
        padding: 1.25rem 1.5rem;
        border-radius: 1rem;
        border: 1px solid #e2e8f0;
        background: #fff;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.15rem;
      }
      p {
        margin: 0;
        font-size: 0.9rem;
        line-height: 1.45;
        color: #475569;
      }
      a {
        display: inline-block;
        margin-top: 1rem;
        padding: 0.65rem 1rem;
        border-radius: 0.75rem;
        background: #047857;
        color: #fff;
        font-weight: 700;
        font-size: 0.875rem;
        text-decoration: none;
      }
    </style>
    <script>
      // Si Capacitor no redirige al server.url (edge cases), ir a prod.
      (function () {
        var target = 'https://viamorelia.org/';
        try {
          if (location.protocol === 'https:' || location.protocol === 'http:') {
            return;
          }
        } catch (e) {}
        // file:// u orígenes embebidos: intentar abrir la web
        setTimeout(function () {
          location.replace(target);
        }, 400);
      })();
    </script>
  </head>
  <body>
    <div class="card">
      <h1>ViaMorelia</h1>
      <p>
        Cargando el mapa y las rutas… Si no avanza, revisa tu conexión o abre la
        web.
      </p>
      <a href="https://viamorelia.org/">Abrir ViaMorelia</a>
    </div>
  </body>
</html>
